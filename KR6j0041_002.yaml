body:
  text: 唐特進試鴻臚卿三藏沙門不空奉詔譯金剛界大曼拏囉毗盧遮那一切如來族祕密心地印真言羯磨部第二稽首薄伽梵大毗盧遮那能為自在王演說金剛界羯磨諸儀則印契及真言供養諸如來次結羯磨印於心而修習諦觀心月輪而有羯磨杵應結金剛拳等引而兩分右羽金剛拳以握力之端左拳安於臍右羽垂觸地左拳如前相右羽為施願二羽仰相叉進力竪相背彈指橫其端左拳復安臍右羽施無畏是五如來契彼彼真言曰唵引嚩日囉二合馱覩鑁唵引阿屈芻二合毗野二合吽唵引囉怛曩二合三婆嚩怛𠸪二合唵引路計濕嚩二合囉囉引惹紇哩以三合唵引阿謨佉悉第噁次當結羯磨四波羅蜜契各如本佛印而誦於真言彼彼真言曰唵引薩怛嚩二合嚩日哩二合吽唵引囉怛曩二合嚩日哩二合怛𠸪二合唵引達囉摩二合嚩日哩二合紇哩以三合唵引羯囉磨二合嚩日哩二合噁次結十六尊羯磨契之儀右拳安腰側右羽搊擲杵二拳交抱胸進力鉤以招二拳如射法當心作彈指進力如寶形於心旋日輪右肘拄左拳二拳口仰散左蓮右開勢左手想持華右手如把劍覆拳進力拄於臍而平轉並至口仰散先從禪智舒旋舞心兩頰金剛掌於頂二拳被甲胄進力檀慧互二拳而相合十六大士印內外八供養并及於四護印相今當說二拳各腰側向左小低頭二拳以繫鬘從額頂後散二拳側相合從臍至口散二拳如舞儀旋轉掌於頂以金剛掌儀燒香等四印以降三世印鉤索等四攝並拳向下散仰散如捧獻禪智竪如針開掌塗於胸進屈如鉤形進力曲相捻二度便相鉤合腕微搖動彼彼真言曰唵引嚩日囉二合薩怛嚩二合噁唵引嚩日囉二合囉惹𠺁唵引嚩日囉二合囉誐斛入聲唵引嚩日囉二合娑度索唵引嚩日囉二合囉怛曩二合唵唵引嚩日囉二合帝惹暗引唵引嚩日囉二合計覩嚂二合唵引嚩日囉二合賀娑郝入聲唵引嚩日囉二合達磨紇哩以三合唵引嚩日囉二合底乞叉拏三合淡唵引嚩日囉二合係覩𦎌引唵引嚩日囉二合婆灑㘕唵引嚩日囉二合羯磨劍唵引嚩日囉二合𠸪乞叉二合唅唵引嚩日囉二合藥乞叉二合吽唵引嚩日囉二合散地鑁唵引嚩日囉二合囉細斛唵引嚩日囉二合摩利怛囉二合吒引唵引嚩日囉二合擬帝擬入聲唵引嚩日囉二合涅哩二合帝曳二合訖哩二合吒引唵引嚩日囉二合度閉婀唵引嚩日囉二合補澀閉二合唵唵引嚩日囉二合路計溺唵引嚩日囉二合巘第虐唵引嚩日囉二合矩舍𠺁唵引嚩日囉二合播舍吽唵引嚩日囉二合娑普二合吒引鑁唵引嚩日囉二合吠舍斛入聲右心左按地繞輪壇四面各一稱真言安立賢劫位真言曰吽引吽短賢劫千如來十六大名稱先畫彌勒尊次明不空見一切滅惡趣離一切憂暗香象勇猛尊虛空藏智幢無量光月光賢護光網尊次畫金剛藏無盡慧辨積普賢大光明及餘上首尊最初置阿字或書十六名金剛智種子聖天之儀軌依教而安立地居空行天巧智善安布諸尊悉地相次第應當明彼彼真言曰唵引昧怛哩二合野娑嚩二合賀引唵引阿目佉娜㗚捨二合曩野娑嚩二合賀引唵引薩嚩播野惹憾娑嚩二合賀唵引巘馱賀悉底二合娑嚩二合賀引唵引戌囉野娑嚩二合賀引唵引阿迦捨誐囉婆二合娑嚩二合賀引唵引誐惹二合抳曩計妬娑嚩二合賀引唵引阿弭哆鉢囉二合婆娑嚩二合賀引唵引贊捺囉二合嚩日囉二合鉢囉二合婆娑嚩二合賀引唵引婆捺囉二合播囉娑嚩二合賀引唵引入嚩二合攞𩕳鉢囉二合婆吽娑嚩二合賀引唵引嚩日囉二合薩囉婆二合娑嚩二合賀引唵引阿乞叉二合摩底娑嚩二合賀引唵引三滿哆婆捺攞二合野娑嚩二合賀引金剛界大曼拏囉毗盧遮那一切如來族祕密心地印真言三昧耶部第三爾時薄伽梵大毗盧遮那能為自在王演說金剛界三昧之儀軌次結三昧耶於舌觀金剛先合金剛掌便成金剛縛忍願如劍形進力附於背忍願竪如針及屈如寶形移屈如蓮葉面合於掌中檀慧禪智合是為五佛印彼彼真言曰嚩日囉二合惹拏二合喃婀去聲嚩日囉二合惹拏二合喃吽嚩日囉二合惹拏二合喃怛𠸪二合嚩日囉二合惹拏二合喃噁次結三昧耶四波羅蜜契各如佛之契別別誦真言彼彼真言曰嚩日囉二合室哩二合吽嚩日囉二合嬌哩怛㘕嚩日囉二合哆囉紇哩以三合佉嚩日哩二合抳斛次結十六尊八供養四攝三昧耶印契忍願竪如針小大鬪而竪次以金剛縛進力屈如鉤因鉤便交竪不解縛彈指大竪次反屈不改大與次舒六而旋轉前二亦不改中縛下四幢不易前印相反開散於口由縛禪智竪進力屈如蓮由縛竪忍願屈上節如劍忍願從入縛四竪五竪交由縛進力蓮禪智開偃附六度叉而覆大各捻小甲進力針當心進力檀慧開小竪進力鉤縛大捻小根進力拄其背縛偃竪禪智此印展當額從臍口仰散旋舞掌於頂由縛而下散從縛仰開獻由縛禪智針解縛摩於胸由縛進力鉤禪入智虎口上四交如環禪智入掌搖四印而一縛別別誦真言彼彼真言曰三摩野薩怛鑁三合阿曩野薩怛縛三合阿斛素佉娑度娑度素摩賀怛鑁三合嚕補儞庾二合哆阿他鉢囉二合底賀賀賀吽郝薩嚩迦哩耨佉砌娜沒馱地鉢囉二合底捨左娜二合素嚩始怛鑁二合𩕳㗚婆二合野怛鑁二合設咄嚕二合薄乞叉二合薩嚩悉地摩賀囉底嚕播戍陛戍嚕二合怛囉二合嫂佉也二合薩縛布𡁠鉢囉二合賀攞二合禰𩕳跛攞誐弭素帝惹擬哩二合素巘馱擬入聲阿野醯𠺁阿醯吽吽呬娑普二合吒鑁佉吒噁噁入聲金剛界大曼拏囉毗盧遮那一切如來族祕密心地印真言供養部第四敬禮毗盧尊能為自在王演說供養部供養諸如來次結供養契應結金剛縛印相從心起初結遍照尊羯磨之印儀真言曰唵引薩嚩怛他誐哆一嚩日囉二合馱怛味二合二弩哆囉布惹三娑頗二合囉拏二合四三摩曳五吽次結金剛薩埵羯磨印觸地手唵引薩嚩怛他誐哆一嚩日囉二合薩怛嚩二合二弩哆囉布惹三娑頗二合囉拏四三摩曳五吽六次結金剛寶羯磨印施願手唵引薩嚩怛他誐哆一嚩日囉二合囉怛曩二合二弩跢囉布惹三娑頗二合囉拏四三摩曳五吽六次結金剛法羯磨印法定手唵引薩嚩怛他誐哆一嚩日囉二合達囉摩二合二弩跢囉布惹三娑頗二合囉拏四三摩曳五吽六次結金剛業羯磨印最上手唵引薩嚩怛他誐哆一嚩日囉二合迦囉磨二合二弩哆囉布惹三娑頗二合囉拏四三摩曳五吽六次心上金剛縛密語曰入嚩手十六唵引薩嚩怛他誐哆一薩嚩怛磨二合𩕳哩也二合哆曩二布惹娑頗二合囉拏三迦囉磨二合嚩日哩二合四噁五右脅密語曰唵引薩嚩怛他誐哆一薩嚩怛摩二合𩕳哩也二合怛曩二娑度迦囉三布惹娑頗二合囉拏四迦囉磨二合覩瑟致二合五索六額上密語曰唵引曩莫薩嚩怛他誐哆一鼻曬迦二囉怛寧二合毗喻二合三嚩日囉二合摩抳唵引四心上旋轉如日輪轉相密語曰唵引曩莫薩嚩怛他誐哆一捨播哩布囉拏二唧跢摩抳三馱嚩二合惹詣哩二合毗喻二合四嚩日囉二合馱嚩二合惹五擬哩二合怛覽二合引六口上笑處解散密語曰唵引曩莫薩嚩怛他誐哆一摩賀必哩二合底二鉢囉二合謨儞也二合迦𠼝毗喻二合三嚩日囉二合賀細郝四口上密語曰唵引薩嚩怛他誐哆一嚩日囉二合達囉磨二合二哆三摩地僻三薩覩二合弩弭四摩賀達囉磨二合五擬哩二合紇哩以三合六右耳密語曰唵引薩嚩怛他誐哆一鉢囉二合惹拏二合播囉弭哆二鼻𩕳囉賀三薩覩二合弩弭四摩賀具灑弩猊淡五左耳密語曰唵引薩嚩怛他誐哆一作羯囉二合乞叉二合囉二播哩嚩㗚哆二合曩三薩嚩素怛覽二合四怛曩野曳五薩覩二合弩弭六薩嚩曼拏囉吽七頂後密語曰唵引薩嚩怛他誐哆一散馱薄灑二沒馱僧擬底鼻誐喃三薩覩二合弩弭四嚩日囉二合嚩際作五香頂上密語曰唵引薩嚩怛他誐哆一度播銘伽三母捺囉二合二娑頗二合囉拏三布惹迦囉弭二合四迦囉迦囉入聲引五華右肩上密語曰唵引薩嚩怛他誐哆一補瑟跛二合鉢囉二合摩囉二娑頗二合囉拏三布惹羯囉弭二合四枳哩枳哩五燈右跨上密語曰唵引薩嚩怛他誐哆一路迦入嚩二合囉二娑頗二合囉拏三布惹羯囉弭二合四婆囉婆囉五塗復置心上密語曰唵引薩嚩怛他誐哆一彥馱銘伽三母捺囉二合二娑頗二合囉拏三布惹羯囉弭二合四俱嚕俱嚕五次結散華契觀察於十方言我今勸請諸佛轉法輪復應作是念今此贍部洲及於十方界人天意生華水陸所有華皆持獻十方一切大薩埵部中諸眷屬契明密諸天我為普供養一切諸如來而作事業故密語曰唵引薩嚩怛他誐哆一補瑟波二合布惹銘伽二三母捺囉二合三娑頗二合囉拏四三摩曳吽五又結燒香契而作是思惟人天本體香和合變易香如來羯磨故我今皆奉獻密語曰唵引薩嚩怛他誐哆一巘馱布惹銘伽二三母捺囉二合三娑頗二合囉拏四三摩曳吽五次結燈契已而作是思惟人天本體生及差別光明為作事業故我今皆奉獻密語曰唵引薩嚩怛他誐哆一儞播布惹銘伽二三母捺囉二合三娑頗二合囉拏四三摩曳吽五三昧耶寶契應作如是念此界及餘界寶山諸寶類地中及海中彼皆為供養如來羯磨故我今皆奉獻當誦此密語密言曰唵引薩嚩怛他誐哆一𠆙焰二合誐囉怛曩二合稜去聲迦囉二布惹銘伽三母捺囉二合三娑頗二合囉拏三摩曳吽四次結嬉戲契應作是思惟人天之所有種種諸戲弄玩笑妓樂具皆為供養佛而作事業故我今當奉獻縛大捻小根進力拄其背密語曰唵引薩嚩怛他誐哆一賀寫囉寫二枳哩二合弩囉底三掃企也二合弩跢囉四布惹銘伽三母捺囉二合五娑頗二合囉拏三摩曳吽六薩埵三昧耶應作是思惟如是劫樹等能與種種衣嚴身資具者彼皆為供養而作事業故我今當奉獻誦此祕密言密言曰唵引薩嚩怛他誐哆一弩哆囉嚩日嚕二合播摩三摩地二婆嚩曩播曩三部惹曩嚩娑曩四布惹銘伽三母捺囉二合五娑頗二合囉拏三摩曳吽六羯磨三昧耶而作是思惟於虛空藏中所有諸如來我為承事故想一一佛前而皆有己身以親近侍奉當誦此密語真言曰唵薩嚩怛他誐哆一迦野𩕳哩也二合哆曩二布惹銘伽三母捺囉二合三娑頗二合囉拏三摩曳吽達磨三昧耶而作是思惟我今即此身與諸菩薩等觀得法實性平等無有異既作無有異而誦此密言密語曰唵引薩嚩怛他誐哆一唧跢𩕳哩也二合怛曩二布惹銘伽三母捺囉二合三娑頗二合囉拏三摩曳吽寶幢三昧耶應觀生死中一切衆生類苦惱之所纏深生哀愍故我今為救護并護菩提心未度者令度未安者令安皆令得涅槃及雨種種寶所求令滿足作是思惟已而誦此密言密語曰唵引薩嚩怛他誐哆一摩賀嚩日嚕二合娜婆二合嚩娜曩二播囉弭哆三布惹銘伽三母捺囉四娑頗二合囉拏三摩曳吽次結香身契三昧耶塗香而作是思惟願一切衆生三業諸不善願悉皆遠離一切諸善法願悉皆成就而誦此密言密語曰唵引薩嚩怛他誐哆一弩跢囉摩賀地也二合賀囉迦二試攞播囉弭哆三布惹銘伽三母捺囉二合四娑頗二合囉拏三摩曳吽結羯磨觸地復應作是念願一切衆生慈心無惱害遠離諸怖畏相視心歡喜諸相好莊嚴成甚深法藏當誦此真言密語曰唵引薩嚩怛他誐哆一弩跢囉摩賀達囉磨二合嚩達二乞産二合底播囉弭哆三布惹銘伽三母捺囉二合四娑頗二合囉拏三摩曳吽鬪勝精進契三昧耶甲胄而作是思惟願一切衆生行菩薩行者被堅固甲胄密語曰唵引薩嚩怛他誐哆一僧娑囉播哩底也二合誐弩哆囉二摩賀尾哩也二合播囉弭哆三布惹銘伽三母捺囉二合四娑頗二合囉拏三摩曳吽結三摩地契華方佛羯磨應作是思惟願一切衆生調伏於煩惱隨煩惱冤讎獲甚深禪定而誦此密語密語曰唵引薩嚩怛他誐哆一弩跢囉摩賀掃企也二合尾賀囉二地也二合曩播囉弭哆三布惹銘伽三母捺囉二合四娑頗二合囉拏三摩曳吽次結遍照尊羯磨勝契已而作是思惟願一切衆生成就五種明世間出世間智慧普成就而得真實見除煩惱障智辨才無畏等佛法嚴其心而誦此密語密語曰唵引薩嚩怛他誐哆一弩哆囉枳禮二合捨惹拏二合野二嚩囉拏嚩娑曩三尾曩野曩四摩賀鉢囉二合惹拏二合播囉弭哆五布惹銘伽三母捺囉二合六娑頗二合囉拏三摩曳吽勝上三摩地印契次應結二羽外相叉禪智令相捻仰安於懷中應作是思惟證法真實性空無相無作諸法悉如是觀已誦密言密語曰唵引薩嚩怛他誐哆一虞上聲醯野二合摩賀鉢囉二合底播底二布惹銘伽三母捺囉二合三娑頗二合囉拏三摩曳吽次應合指爪而作是思惟二羽金剛縛進力禪智口我今出語言願一切衆生悉皆令得聞誦此祕密言密言曰唵引薩嚩怛他誐哆一嚩枳也二合𩕳哩也二合怛曩二布惹銘伽三母捺囉二合三娑頗二合囉拏三摩曳吽如是廣作佛事已次應諦心為念誦衆會眷屬自圍繞住於圓寂大鏡智當結金剛三昧耶而誦金剛百字明次誦金剛薩埵明三遍五遍或七遍真言曰唵引嚩日囉二合薩怛嚩二合三摩野一摩弩播攞野二嚩日囉二合薩怛嚩二合怛味二合三弩播底瑟姹二合四涅哩二合嗏銘婆嚩五素妬瑟欲二合銘婆嚩六阿努囉訖妬二合銘婆嚩七素布瑟欲二合銘婆嚩八薩嚩悉朕銘九婆嚩鉢囉二合野瑳十薩嚩羯磨素十一左銘唧哆室哩二合藥俱嚕十二吽十三賀引賀賀賀斛十四婆誐鑁十五薩嚩怛他引誐哆十六嚩日囉二合摩銘悶左重聲十七嚩日囉二合婆嚩十八摩賀引三摩野十九薩怛嚩二合噁二十次應捧珠鬘誦真言七遍復以加持句如法而加持端坐如儀則應以金剛語一千或一百隨意而念誦真言曰唵引嚩日囉二合薩怛嚩二合引二羽捧珠鬘本真言七遍捧至頂及心千轉以加持真言曰唵引嚩日囉二合虞醯野二合惹播三摩曳吽既加持珠已住等引而誦不極動舌端脣齒二俱合成就諸密教金剛語離聲循身觀相好四時不令間百千是為限又復應過是神通及福智見世同薩埵念誦分限畢捧珠發大願結三摩地契入法界三昧行者出三昧即結根本印念本明七遍復結八供養以妙音讚歎獻閼伽香水以降三世印左旋而解界次結三昧拳一誦而掣開次結羯磨拳三誦三開手從彼彼出生所有一切印於彼彼當解由此真言心真言曰唵引嚩日囉二合穆乞叉二合穆入聲次結奉送印二羽金剛縛忍願如蓮葉指端安時華誦已而上擲為奉送聖衆真言曰唵引訖哩二合妬嚩入聲一薩嚩薩怛嚩二合二囉他二合悉第娜二合三哆野他四弩誐孽瑳馱鑁二合五沒馱尾灑野六布曩囉誐七摩曩野覩八唵引嚩日囉二合薩怛嚩二合九目乞叉二合目入聲十次當結寶印二羽金剛縛進力如寶形禪智亦復然印相從心起安於灌頂處分手如繫鬘次結甲胄印真言曰唵引嚩日囉二合囉怛曩二合一鼻詵左𤚥二薩嚩母娜囕二合銘三涅哩二合稚俱嚕四嚩日囉二合迦嚩左曩鑁五唵引砧次結被甲已齊掌而三拍令聖衆歡喜以此心真言解縛得歡喜獲得金剛體真言曰唵引嚩日囉二合覩瑟野二合斛入聲奉送聖衆已當結加持契誦明加四處灌頂被甲胄又為拍印儀如前禮四佛懺悔并發願然後依間靜嚴飾以香華住於三摩地讀誦大乘典隨意任經行
