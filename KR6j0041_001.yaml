body:
  text: 唐特進試鴻臚卿三藏沙門不空奉詔譯深妙祕密金剛界大三昧耶修習瑜伽儀第一稽首薄伽梵大毗盧遮那能為自在王演説金剛界無邊功德法成五解脫輪三十七智身我今歸命禮瑜伽大教王開演一佛乘如來三密藏是乘無比喻最上最第一唯佛不共智相應成佛門為令悟入者圓成淨法身三世薄伽梵皆依此法成是故諸如來敬禮如理法若修此法者善住於師位備族姓相好調柔心正直以戒常嚴身以戒常嚴身清淨無所畏於此祕密乘決定深信解空有性相義隨化道應知住大悲方便引接諸群品能令所依者頓獲如來位已入金剛界諸佛大壇場生在如來家受法王灌頂瞻禮於聖會不捨菩提心恭敬阿闍黎等同一切佛所有言教誨皆當盡奉行於諸同學處不生嫌恨心敬如金剛手乃至諸含識亦不應輕惱諸天神仙等皆不應禮事勿應毀陵蔑所覩諸法具不應故騎騫為此大場內諸聖所執持親從阿闍黎得傳教灌頂明解三摩耶諸正遍知道通明廣略教瑜伽身語心妙解曼拏囉了真言實義如是阿闍黎諸佛所稱讚等同薄伽梵大毗盧遮那即是諸如來金剛蓮華手虛空巧業尊故應堅守護本尊三昧耶倍過於身命常修外儀式洗漱嚼齒木噉豆䓻塗香令身口香潔不應食薰雜酒肉諸殘觸飲食離諸過不應與他人同床鋪座臥常潔身淨服令內外無垢不應常爪甲居穢違教故內所為六根用三密淨除外謂諸儀則法香水灌頂或外緣不備即以法淨除此理趣最勝當觀念囕字淨除內外垢不沐而成浴蕩滌等虛空無垢如法界事理俱相應如來最稱讚初起金剛定普覺諸群品行即如來行坐即如來坐諸入無言説一音遍法界後與大悲念利樂盡無餘有情器世間嚴淨如來土若自他建立勝大曼拏囉選地結壇場如經之所説上施妙天蓋周匝悉懸幡瑜鬘鈴珮等間錯垂供養布散諸尊位散時華莊嚴賢妃閼伽水燒香華塗香燈明及飲食金銀寶器盛及以淨梵等真言香水灑復以燒香熏陳設壇四邊諦心為供養修行瑜伽者每入曼拏囉觀身如普賢足步蹈蓮華趣於精室門閉戶稱吽字怒目除不祥即五體投地敬禮世尊足及一乘法僧即長跪合掌運心對聖衆勸請願回向具法者應入金剛三摩地字發智火燒除虛妄因情器等虛空名如理作意心如理成就是名為法性法安住法位是名為法界復加身口心成三密三身真言行菩薩應當善修習塗香遍塗手復用燒香熏結淨器世間寂光華藏印即以定慧手觀念離塵法真言如是稱唵引囉儒波誐怛薩嚩達摩引次當淨三業觀身本清淨誦此真言明得三業皆淨淨身真言曰唵引薩嚩二合婆嚩秫馱薩嚩達摩薩嚩二合婆嚩秫度憾由此真言故其身成法器於虛空觀佛遍滿如胡麻則誦遍照明歷然見諸佛觀佛真言曰欠嚩日囉二合馱覩警覺諸如來檀慧相鉤竪進力二相拄是名為起印唵引嚩日囉二合底瑟姹二合吽吽字想於心變成五智杵應想遍身中所有微塵數為金剛薩埵金剛掌舒臂全身委地禮捨身遍法界奉獻阿閦尊盡禮事諸佛真言曰唵引薩嚩怛他誐哆一布𭉷播引薩他二合曩野怛摩二合喃二禰哩也二合哆野弭三薩嚩怛他引誐哆四嚩日囉二合薩怛嚩二合五地瑟姹二合娑嚩二合𤚥六吽七次想怛𠸪字於額金剛寶想身為寶形身中微塵數想成金剛藏全身以額禮金剛掌於心奉獻寶生尊想於無邊剎首持五佛冠灌一切佛頂真言曰唵引薩嚩怛他誐哆一布惹鼻曬迦野怛摩三合喃二禰哩也二合哆野弭三薩嚩怛他誐哆四嚩日囉二合囉怛那二合五鼻曬左娑嚩二合𤚥怛𠸪六觀紇哩字於口即想八葉蓮觀身為蓮華身中微塵數想成金剛法全身以口禮金剛掌於頂奉獻無量壽遍想諸佛會而請轉法輪真言曰唵引薩嚩怛他誐哆一布惹鉢囉二合嚩哆曩野怛摩二合喃二禰哩也二合哆野弭三薩嚩怛他誐哆四嚩日囉二合達磨五鉢囉二合嚩哩哆二合野娑嚩二合𤚥六紇哩以三合七阿字想於頂變為業金剛觀身普金剛身中微塵數皆成金剛業全身以頂禮當心金剛掌奉獻不空尊想於普集會觀金剛業身而作大供養真言曰唵引薩嚩怛他誐哆一布惹迦磨抳阿怛摩二合喃二禰哩也二合哆野弭三薩嚩怛他誐哆四嚩日囉二合迦磨五俱嚕娑嚩二合𦎌六阿入聲七次結金剛持大印禪慧檀智反相叉右膝著地置頂上一一想禮如來足舒指從頂如垂帶從心旋轉如舞勢金剛合掌置頂上真言曰唵引薩嚩怛他誐哆一迦野弭嚩枳唧哆二嚩日囉二合鉢囉二合拏每三嚩日囉二合滿娜喃迦嚕彌四唵引嚩日囉二合吻尾一切五歸命十方等正覺最勝妙法菩薩衆以身口意清淨業殷勤合掌恭敬禮無始輪回諸有中身口意業所生罪如佛菩薩所懺悔我今陳懺亦如是諸佛菩薩行願中金剛三業所生福緣覺聲聞及有情所集善根盡隨喜一切世燈坐道場覺眼開敷照三有我今胡跪先勸請轉於無上妙法輪所有如來三界主臨般無餘涅槃者我皆勸請令久住不捨悲願救世間懺悔勸請隨喜福願我不失菩提心諸佛菩薩妙衆中常為善友不厭捨離於八難生無難宿命住智相嚴身遠離愚迷具悲智悉能滿足波羅蜜富樂豐饒生勝族眷屬廣多常熾盛四無礙辨十自在六通諸禪悉圓滿如金剛幢及普賢願讚回向亦如是行者廣大願次應發勝心願一切有情如來所稱讚世間出世間速成勝悉地合掌真言曰唵引薩嚩怛他誐哆一商悉哆入聲薩嚩薩怛嚩二合喃二薩嚩悉馱藥三三播儞演二合耽引怛他誐哆引四室左二合地底瑟姹二合耽去聲引五摩吒於兩目應觀為日月二手金剛拳各安於腰側遍視空中佛諸佛皆歡喜所有香華等及餘供養具因此目瞻覩去垢成清淨辟除成結界真言曰唵引嚩日囉二合涅哩二合瑟致二合麼吒福智二羽合十度初分交名為金剛掌一切印之首真言曰唵引嚩日囉二合惹禮引即彼金剛掌十度結為拳名為金剛縛能解結使縛真言曰唵引嚩日囉二合滿馱引即以金剛縛能淨第八識亦除雜染種怛囉二合吒二字想安於兩乳二羽金剛縛掣開如戶樞真言曰唵引嚩日囉二合滿馱怛囉二合吒引即以金剛縛禪智屈入掌檀慧戒方間想召無漏智入於藏識中真言曰唵引嚩日囉二合吠捨噁引即以前印相進力拄禪智以附於心門無漏智堅固真言曰唵引嚩日囉二合母瑟致二合鑁二羽金剛縛忍願竪如針才誦真言已自身成普賢坐於月輪上身前觀普賢真言曰唵引三摩野薩怛鑁三合引行者次應結大誓真實契二羽金剛縛檀慧禪智竪忍願交入掌指面令相合以二度刺心名為大悲箭以射厭離心極喜三昧耶警覺本誓願真言曰唵引三摩野斛二合素怛囉薩怛鑁三合引行者次應結降三世大印二羽忿怒拳檀慧背鉤結進力二背竪身想忿怒王八臂而四面笑怒恐怖形四牙熾盛身右足笪左直踏大天及后厲聲誦真言旋轉於十方左轉為辟除右旋成結界真言曰唵引遜婆𩕳遜婆𩕳吽一屹哩二合賀拏二合屹哩二合賀拏二合吽二屹哩二合賀拏二合播野吽三阿曩野斛婆誐鑁四嚩日囉二合吽五發吒引六次結金剛蓮二羽金剛縛檀慧禪智竪蓮華三昧耶得成蓮華部轉輪之主宰真言曰唵引嚩日囉二合鉢納摩二合三摩野薩怛鑁三合引阿賴耶識中違背菩提種次結法輪印摧破厭離輪即前蓮華印檀慧而交竪摧制於自心即滅二乘種真言曰吽一吒引枳重聲娑普二合吒引野二摩賀尾囉誐三嚩日囕二合嚩日囉二合馱囉四薩帝曳五二合囊𭇵敕角切次結大欲印二羽金剛縛禪入智虎口隨誦而出入真言曰唵引素囉哆一嚩日囕二合𠺁吽鑁斛二薩摩野薩怛鑁二合三引大樂不空身印契同於上普願諸有情速證如來地修行瑜伽者自成大深智菩提大欲滿圓成大悲種真言曰唵引摩賀素佉一嚩日囕二合娑引馱野二薩嚩薩怛吠二合三毗喻二合𠺁吽鑁引斛四次結召罪印二羽金剛縛忍願伸如針進力屈如鉤起大悲愍心來去而觀想召諸有情罪自身三惡趣衆罪召入掌黑色如雲霧衆多諸鬼形真言曰唵引薩嚩播波一迦㗚灑二合拏二尾戍馱曩三嚩日囉三合薩怛嚩二合四三摩野五吽六𠺁引七次結摧罪印八度內相叉忍願如前竪應觀獨鈷杵當觀自身相變成降三世厲聲誦真言內心起慈悲忍願應三拍摧諸有情罪三惡皆辟除真言曰唵引嚩日囉二合播抳一尾娑普二合吒引野二薩嚩播野滿馱曩𩕳三鉢囉二合謨訖囇二合野四薩嚩播波誐底毗藥二合五薩嚩薩怛嚩二合六薩嚩怛他誐哆七嚩日囉二合三摩野吽八怛囉二合吒引九次應淨業障令滅決定業二羽金剛掌進力屈二節禪智押二度結此業障除真言曰唵引嚩日囉二合羯囉摩二合一尾戍馱野二薩嚩嚩囉拏𩕳三沒馱薩帝曳二合曩四三摩野五吽六次成菩提心自他令圓滿即如蓮華契檀慧禪智竪安於頂之左真言曰唵引贊捺嚕二合多𠼝一三滿哆婆捺囉二合枳囉尾尼皆切二摩賀嚩日哩二合抳尼盈切三吽四運心諸有情月上如來威速成如普賢瑜伽經所説應結跏趺坐支節不動搖應結等印持二羽金剛縛仰安於臍下端身勿動搖舌拄於上腭止息令微細諦觀諸法性皆由於自心煩惱隨煩惱蘊界諸處等皆如幻與焰如乾闥婆城亦如旋火輪又如空谷響如是諦觀已不見於身心住寂滅平等究竟真實智即觀於空中諸佛如胡麻遍滿虛空界想身證十地住於如實際空中諸如來彈指而警覺告言善男子汝之所證處是一道清淨金剛喻三昧及薩般若等尚未能證知勿以此為足應滿足普賢方成最正覺身心不動搖定中禮諸佛真言曰唵引薩嚩怛他誐哆一波娜滿那喃迦嚕弭行者聞警覺定中普禮已唯願諸如來示我所行處諸佛同告言汝應觀自心既聞是説已如教觀自心久住諦觀察不見自心相復想禮佛足白言最勝尊我不見自心此心為何相諸佛咸告言心相難測量授與心真言即誦徹心明觀心如月輪若在輕霧中如理諦觀察真言曰唵引唧哆鉢囉二合底一味淡迦嚕弭二藏識本非染清淨無瑕穢長時積福智喻若淨月輪無體亦無事即説亦非月由具福智故自心如滿月踊躍心歡喜復白諸世尊我已見自心清淨如滿月離諸煩惱垢能執所執等諸佛皆告言汝心本如是為客塵所翳菩提心為淨汝觀淨月輪得證菩提心授此心真言密誦而觀察真言曰唵引地唧哆一母怛摩二合那野弭二能令心月輪圓滿益明顯諸佛復告言菩提心堅固復受心真言觀金剛蓮華真言曰唵引速乞叉二合摩嚩日囉二合引觀五股金剛真言曰唵引底瑟姹二合嚩日囉二合汝於淨月輪觀五智金剛令普周法界唯一大金剛漸廣真言曰唵引娑頗二合囉嚩日囉二合引漸略真言曰唵引僧賀引囉嚩日囉二合引應當知自身即為金剛界真言曰唵引嚩日囉二合怛摩二合句憾自身為金剛堅實無染壞復白諸佛言我為金剛身時彼諸如來便敕行者言觀身為佛形復授此真言唵引野他引一薩嚩怛他誐哆二薩怛二合他憾既見身成佛相好皆圓備諸如來加持現證實相智不改前印相應誦此真言唵引薩嚩怛他誐哆一鼻三地涅哩二合嗏二嚩日囉二合底瑟吒二合三次結四如來三昧耶印契各以本真言而用加持身不動佛於心寶生尊於額無量壽於喉不空成就頂真言曰唵引嚩日囉二合薩怛嚩二合一地瑟姹二合娑嚩二合𦎌二吽三唵引嚩日囉二合囉怛曩二合一地瑟姹二合娑嚩二合𦎌二怛𠸪二合三唵引嚩日囉二合達囉磨二合一地瑟姹二合娑嚩二合𦎌二紇哩以三合三唵引嚩日囉二合羯囉磨二合一地瑟姹二合娑嚩二合𦎌二噁三既已加持身次